<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小莫 ♥ 小颜 - 我们的小世界</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑","PingFang SC";}
body{
background:#fff7fc;
background-image:radial-gradient(circle at 20% 20%,#ffebf5 0%,transparent 30%),
radial-gradient(circle at 80% 70%,#fceeff 0%,transparent 30%);
min-height:100vh;
color:#555;
}
.container{
max-width:700px;
margin:0 auto;
padding:60px 20px;
text-align:center;
}
.title{
font-size:32px;
color:#ff709e;
font-weight:bold;
margin-bottom:10px;
}
.title span{
color:#ff4a8e;
}
.heart{
color:#ff4a8e;
font-size:24px;
animation:jump 1s infinite alternate;
}
@keyframes jump{
0%{transform:translateY(0);}
100%{transform:translateY(-8px);}
}
.subtitle{
font-size:18px;
color:#999;
margin-bottom:40px;
}
.love-box{
background:#ffffffaa;
border-radius:20px;
padding:40px 30px;
box-shadow:0 8px 30px rgba(255,155,200,0.1);
border:2px solid #ffd6e9;
}
.names{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
font-size:26px;
font-weight:bold;
color:#ff5a9a;
margin-bottom:25px;
}
.names .mo{color:#7f70ff;}
.names .yan{color:#ff70b8;}
.line{
width:50px;
height:3px;
background:#ffb6d6;
margin:10px auto;
border-radius:3px;
}
.desc{
font-size:16px;
color:#777;
line-height:1.8;
margin-bottom:30px;
}
.btns{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}
.btn{
padding:12px 25px;
border-radius:30px;
border:none;
background:#ff8bb8;
color:white;
font-size:15px;
box-shadow:0 4px 10px rgba(255,123,160,0.2);
transition:0.3s;
cursor:pointer;
}
.btn:hover{
background:#ff5a9a;
transform:translateY(-3px);
}
.btn-purple{
background:#bba6ff;
}
.btn-purple:hover{
background:#997cff;
}
.footer{
margin-top:50px;
font-size:14px;
color:#bbb;
}
</style>
</head>
<body>
<div class="container">
<h1 class="title">小莫 <span class="heart">♥</span> 小颜</h1>
<p class="subtitle">我们的恋爱小窝 · 永远甜甜的</p>

<div class="love-box">
<div class="names">
<span class="mo">小莫</span>
<span>💓</span>
<span class="yan">小颜</span>
</div>

<div class="line"></div>

<p class="desc">
世界这么大，刚好遇见你。<br>
小莫会一直陪着小颜，包容、温柔、认真相爱。<br>
往后每一天，都是我们甜甜的时光。
</p>

<div class="btns">
<button class="btn">永远爱你</button>
<button class="btn btn-purple">一直在一起</button>
<button class="btn">岁岁年年</button>
</div>
</div>

<div class="footer">
© 小莫 & 小颜 · 专属恋爱小站
</div>
</div>
</body>
</html>
